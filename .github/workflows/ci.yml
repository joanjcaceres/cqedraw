name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      web: ${{ steps.filter.outputs.web }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: filter
        name: Classify changed files
        shell: bash
        run: |
          set -euo pipefail

          run_python=false
          run_web=false

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            run_python=true
            run_web=true
          else
            git fetch origin "${{ github.base_ref }}" --depth=1
            changed_files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"

            if printf '%s\n' "$changed_files" | grep -Eq '^(\.github/workflows/ci\.yml|\.github/workflows/release\.yml|pyproject\.toml|assets/|packaging/|scripts/|cqedraw/|tests/)'; then
              run_python=true
            fi

            if printf '%s\n' "$changed_files" | grep -Eq '^(\.github/workflows/ci\.yml|\.github/workflows/pages\.yml|web/|cqedraw/(core|web_bridge)\.py|pyproject\.toml)'; then
              run_web=true
            fi
          fi

          echo "python=$run_python" >> "$GITHUB_OUTPUT"
          echo "web=$run_web" >> "$GITHUB_OUTPUT"

  python-test:
    name: Python test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Run tests
        run: pytest

      - name: Verify CLI version command
        run: cqedraw --version

  web-test:
    name: Web test
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Typecheck web app
        run: npm run typecheck

      - name: Run web unit tests
        run: npm test

      - name: Build web app
        run: npm run build

      - name: Run web browser tests
        run: npm run test:e2e

  ci-summary:
    name: CI policy summary
    needs: [changes, python-test, web-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize path-aware CI
        shell: bash
        run: |
          set -euo pipefail
          echo "Python checks requested: ${{ needs.changes.outputs.python }}"
          echo "Web checks requested: ${{ needs.changes.outputs.web }}"
          echo "Detect changed areas result: ${{ needs.changes.result }}"
          echo "Python checks result: ${{ needs.python-test.result }}"
          echo "Web checks result: ${{ needs.web-test.result }}"

          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "Changed-area detection failed."
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.python }}" == "true" && "${{ needs.python-test.result }}" != "success" ]]; then
            echo "Python checks were requested but did not pass."
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.web }}" == "true" && "${{ needs.web-test.result }}" != "success" ]]; then
            echo "Web checks were requested but did not pass."
            exit 1
          fi
