name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-python-dists:
    name: Build Python distributions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: python -m pip install build

      - name: Build wheel and source distribution
        run: python -m build

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*

  build-native:
    name: Build native beta (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-latest
            icon: assets/icon.icns
            artifact: cQEDraw-macOS.zip
          - name: Windows
            os: windows-latest
            icon: assets/icon.ico
            artifact: cQEDraw-Windows.zip

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and PyInstaller
        run: python -m pip install -e ".[native]"

      - name: Build macOS app bundle
        if: runner.os == 'macOS'
        run: >
          pyinstaller
          --noconfirm
          --clean
          --name "cQEDraw"
          --paths .
          --windowed
          --onedir
          --icon "${{ matrix.platform.icon }}"
          --copy-metadata mpmath
          --osx-bundle-identifier "com.joancaceres.cqedraw"
          packaging/pyinstaller_entry.py

      - name: Smoke-test macOS bundle executable
        if: runner.os == 'macOS'
        run: |
          "dist/cQEDraw.app/Contents/MacOS/cQEDraw" --version
          "dist/cQEDraw.app/Contents/MacOS/cQEDraw" --check-gui-import

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        run: >
          ditto -c -k --sequesterRsrc --keepParent
          "dist/cQEDraw.app"
          "dist/${{ matrix.platform.artifact }}"

      - name: Build Windows executable bundle
        if: runner.os == 'Windows'
        run: >
          pyinstaller
          --noconfirm
          --clean
          --name "cQEDraw"
          --paths .
          --windowed
          --onedir
          --icon "${{ matrix.platform.icon }}"
          --copy-metadata mpmath
          packaging/pyinstaller_entry.py

      - name: Smoke-test Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "dist/cQEDraw/cQEDraw.exe" --version
          & "dist/cQEDraw/cQEDraw.exe" --check-gui-import

      - name: Package Windows executable bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/cQEDraw" -DestinationPath "dist/${{ matrix.platform.artifact }}"

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: dist/${{ matrix.platform.artifact }}

  publish-github-release:
    name: Publish GitHub Release
    needs: [build-python-dists, build-native]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          body: |
            Unsigned beta desktop builds are attached for macOS and Windows.
            Python wheel and source distributions are attached for advanced
            users, but PyPI publishing is not enabled for this beta release.

            macOS and Windows may show security warnings because the beta builds
            are not code signed or notarized yet.
