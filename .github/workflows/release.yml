name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-python-dists:
    name: Build Python distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: python -m pip install build

      - name: Build wheel and source distribution
        run: python -m build

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*

  build-native:
    name: Build native beta (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-latest
            icon: assets/icon.icns
            artifact: BBQ-Circuit-Designer-macOS.zip
          - name: Windows
            os: windows-latest
            icon: assets/icon.ico
            artifact: BBQ-Circuit-Designer-Windows.zip

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and PyInstaller
        run: python -m pip install -e ".[native]"

      - name: Build macOS app bundle
        if: runner.os == 'macOS'
        run: >
          pyinstaller
          --noconfirm
          --clean
          --name "BBQ Circuit Designer"
          --paths .
          --windowed
          --onedir
          --icon "${{ matrix.platform.icon }}"
          --osx-bundle-identifier "com.joancaceres.bbq-circuit-designer"
          packaging/pyinstaller_entry.py

      - name: Smoke-test macOS bundle executable
        if: runner.os == 'macOS'
        run: '"dist/BBQ Circuit Designer.app/Contents/MacOS/BBQ Circuit Designer" --version'

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        run: >
          ditto -c -k --sequesterRsrc --keepParent
          "dist/BBQ Circuit Designer.app"
          "dist/${{ matrix.platform.artifact }}"

      - name: Build Windows executable bundle
        if: runner.os == 'Windows'
        run: >
          pyinstaller
          --noconfirm
          --clean
          --name "BBQ Circuit Designer"
          --paths .
          --windowed
          --onedir
          --icon "${{ matrix.platform.icon }}"
          packaging/pyinstaller_entry.py

      - name: Smoke-test Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: '& "dist/BBQ Circuit Designer/BBQ Circuit Designer.exe" --version'

      - name: Package Windows executable bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/BBQ Circuit Designer" -DestinationPath "dist/${{ matrix.platform.artifact }}"

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: dist/${{ matrix.platform.artifact }}

  publish-github-release:
    name: Publish GitHub Release
    needs: [build-python-dists, build-native]
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          body: |
            Unsigned beta desktop builds are attached for macOS and Windows.

            macOS and Windows may show security warnings because the beta builds
            are not code signed or notarized yet.

  publish-pypi:
    name: Publish to PyPI
    needs: build-python-dists
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bbq-circuit-designer
    permissions:
      id-token: write
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
